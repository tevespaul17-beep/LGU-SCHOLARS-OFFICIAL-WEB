<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Account</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pIwXN5qQ4IYHn5QjNqjmq6WjzPJfh4Y5Fe2a2k+BCVnDGGpR/B5nCWy+ZJc6S5v4AfxTDCXSeI5VgxkwPJ7jtg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1 style="color: var(--deep-blue);">Create New Account</h1>
    <div id="message"></div>
    <form id="registerForm">
      <label for="role">Account Type</label>
      <select id="role" name="role" required>
        <option value="scholar">Scholar</option>
        <option value="admin">Admin</option>
      </select>
      <div class="input-icon">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" name="email" placeholder="Email" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-user"></i>
        <input type="text" id="firstName" name="firstName" placeholder="First Name" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-user"></i>
        <input type="text" id="lastName" name="lastName" placeholder="Last Name" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-school"></i>
        <input type="text" id="school" name="school" placeholder="School" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-calendar"></i>
        <input type="text" id="schoolYear" name="schoolYear" placeholder="School Year" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-home"></i>
        <input type="text" id="address" name="address" placeholder="Address" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Password" required minlength="6">
      </div>
      <button type="submit">Register</button>
    </form>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const res = await fetch('/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if (res.ok) {
        document.getElementById('message').innerText = result.message;
        e.target.reset();
      } else {
        document.getElementById('message').innerText = result.message;
      }
    });
  </script>
</body>
</html>
