<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LGU Scholars WEB - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pIwXN5qQ4IYHn5QjNqjmq6WjzPJfh4Y5Fe2a2k+BCVnDGGpR/B5nCWy+ZJc6S5v4AfxTDCXSeI5VgxkwPJ7jtg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="container">
    <h1 style="color: var(--deep-blue);">LGU Scholars WEB</h1>
    <div id="message"></div>
    <form id="loginForm">
      <div class="input-icon">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" name="email" placeholder="Email" required>
      </div>
      <div class="input-icon">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Password" required>
      </div>
      <button type="submit">Login</button>
    </form>
    <div class="links">
      <a href="/register">Create New Account</a> |
      <a href="/forgot">Forgot Password</a>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const password = e.target.password.value;
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        window.location = data.redirect;
      } else {
        const msg = document.getElementById('message');
        msg.innerText = data.message;
        msg.className = 'alert alert-error';
      }
    });
  </script>
</body>
</html>
